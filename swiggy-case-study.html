<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Food Discovery</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f7f7f7;
display:flex;
justify-content:center;
}

/* MOBILE CONTAINER */

.mobile-container{
width:390px;
background:white;
min-height:100vh;
position:relative;
padding-bottom:80px;
}

/* HEADER */

.header{
padding:20px;
font-size:22px;
font-weight:bold;
}

/* SEARCH */

.search-bar{
padding:0 20px 20px 20px;
}

.search-bar input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #ddd;
font-size:14px;
}

/* FOOD ICONS */

.food-icons{
display:flex;
justify-content:space-around;
padding:10px 10px 20px 10px;
}

.food-item{
text-align:center;
font-size:12px;
}

.food-item img{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
}

/* DISCOVERY FRIDAY */

.discovery{
padding:0 20px;
}

.discovery h3{
margin-bottom:10px;
}

/* RESTAURANT CARDS */

.restaurant-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.restaurant-card{
background:white;
border-radius:14px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
overflow:hidden;
}

.restaurant-card img{
width:100%;
height:90px;
object-fit:cover;
}

.restaurant-info{
padding:10px;
}

.restaurant-name{
font-size:14px;
font-weight:bold;
}

.restaurant-rating{
font-size:12px;
color:gray;
}

/* BOTTOM MENU */

.bottom-nav{
position:fixed;
bottom:0;
width:390px;
background:white;
display:flex;
justify-content:space-around;
padding:12px 0;
box-shadow:0 -2px 8px rgba(0,0,0,0.1);
}

.nav-item{
text-align:center;
font-size:12px;
color:#444;
}

.nav-item span{
font-size:20px;
display:block;
}

</style>
</head>

<body>

<div class="mobile-container">

<div class="header">
Good Evening
</div>

<div class="search-bar">
<input type="text" placeholder="Search restaurants or food">
</div>


<!-- FOOD ICONS -->

<div class="food-icons">

<div class="food-item">
<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
<div>Pizza</div>
</div>

<div class="food-item">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
<div>Burger</div>
</div>

<div class="food-item">
<img src="https://images.unsplash.com/photo-1569718212165-3a8278d5f624">
<div>Sushi</div>
</div>

<div class="food-item">
<img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">
<div>Salad</div>
</div>

</div>


<!-- DISCOVERY FRIDAY -->

<div class="discovery">

<h3>Discovery Friday</h3>

<div class="restaurant-grid">

<div class="restaurant-card">
<img src="https://images.unsplash.com/photo-1555992336-03a23c7b20ee">
<div class="restaurant-info">
<div class="restaurant-name">Italiano Pizza</div>
<div class="restaurant-rating">⭐ 4.5 • 30 mins</div>
</div>
</div>

<div class="restaurant-card">
<img src="https://images.unsplash.com/photo-1551782450-a2132b4ba21d">
<div class="restaurant-info">
<div class="restaurant-name">Burger Hub</div>
<div class="restaurant-rating">⭐ 4.2 • 25 mins</div>
</div>
</div>

<div class="restaurant-card">
<img src="https://images.unsplash.com/photo-1553621042-f6e147245754">
<div class="restaurant-info">
<div class="restaurant-name">Sushi World</div>
<div class="restaurant-rating">⭐ 4.6 • 35 mins</div>
</div>
</div>

<div class="restaurant-card">
<img src="https://images.unsplash.com/photo-1604908176997-431c16f6f4b2">
<div class="restaurant-info">
<div class="restaurant-name">Healthy Bowl</div>
<div class="restaurant-rating">⭐ 4.3 • 20 mins</div>
</div>
</div>

</div>

</div>

</div>


<!-- BOTTOM NAV -->

<div class="bottom-nav">

<div class="nav-item">
<span>🏠</span>
Home
</div>

<div class="nav-item">
<span>🔍</span>
Search
</div>

<div class="nav-item">
<span>🛒</span>
Cart
</div>

<div class="nav-item">
<span>👤</span>
Profile
</div>

</div>

</body>
</html>
